<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewardly — Set Up Your Wallet</title>
  <style>
    :root {
      --brand: #1DDB82; --brand-light: #4DE89D; --brand-dim: rgba(29,219,130,0.1);
      --purple: #8B5CF6; --purple-light: #A78BFA;
      --bg: #0A0E1F; --surface: #131929; --surface-2: #1C2338;
      --border: #252D45; --text: #F8FAFC; --text-muted: #94A3B8; --text-dim: #64748B;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .page { max-width: 640px; margin: 0 auto; padding: 40px 20px 80px; }
    .hero { text-align: center; margin-bottom: 32px; }
    .hero-logo { font-size: 48px; margin-bottom: 12px; }
    .hero h1 { font-size: 24px; font-weight: 800; background: linear-gradient(90deg, var(--brand-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
    .hero p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 420px; margin: 0 auto; }
    .search-bar { position: relative; margin-bottom: 20px; }
    .search-bar input { width: 100%; padding: 12px 16px 12px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
    .search-bar input:focus { border-color: var(--brand); }
    .search-bar::before { content: "🔍"; position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .selected-count { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .selected-count strong { color: var(--brand-light); }
    .issuer-group { margin-bottom: 20px; }
    .issuer-name { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; padding: 0 2px; }
    .card-grid { display: flex; flex-direction: column; gap: 6px; }
    .card-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
    .card-item:hover { border-color: #444; }
    .card-item.selected { background: var(--brand-dim); border-color: var(--brand); }
    .card-check { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; transition: all 0.15s; }
    .card-item.selected .card-check { background: var(--brand); border-color: var(--brand); color: #000; }
    .card-details { flex: 1; min-width: 0; }
    .card-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .card-annual { font-size: 11px; color: var(--text-dim); }
    .no-results { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }
    .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(8px); border-top: 1px solid var(--border); padding: 14px 20px; }
    .footer-inner { max-width: 640px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .footer-hint { font-size: 13px; color: var(--text-muted); }
    .save-btn { padding: 11px 28px; background: linear-gradient(135deg, var(--brand), #14B66F); color: #0A0E1F; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    .save-btn:hover { opacity: 0.9; }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="hero-logo">💳</div>
      <h1>Add Your Canadian Credit Cards</h1>
      <p>Select the cards in your wallet. No card numbers needed — just pick which ones you own. Rewardly will tell you which to use at checkout.</p>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by card name or issuer…" autocomplete="off">
    </div>

    <p class="selected-count"><strong id="selectedCount">0</strong> cards selected</p>

    <div id="cardList"></div>
  </div>

  <div class="sticky-footer">
    <div class="footer-inner">
      <span class="footer-hint" id="footerHint">Select at least one card to continue.</span>
      <button class="save-btn" id="saveBtn" disabled>Save Wallet</button>
    </div>
  </div>

  <script src="onboarding.js"></script>
</body>
</html>
