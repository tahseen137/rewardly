<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewardly — Settings</title>
  <style>
    :root {
      --brand: #1DDB82; --brand-light: #4AE99E;
      --bg: #0a0a0a; --surface: #141414; --surface-2: #1E1E1E;
      --border: #2A2A2A; --text: #F5F3FF; --text-muted: #9CA3AF; --text-dim: #6B7280;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 480px; margin: 0 auto; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .header h1 { font-size: 20px; font-weight: 700; color: var(--brand-light); }
    .header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 14px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; }
    .setting-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: 11px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: var(--text-muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .toggle input:checked + .toggle-slider { background: var(--brand); border-color: var(--brand); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }
    select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 13px; }
    .wallet-summary { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .wallet-count { font-size: 14px; }
    .edit-wallet-btn { font-size: 13px; color: var(--brand-light); background: none; border: none; cursor: pointer; font-weight: 600; padding: 4px 0; }
    .save-btn { width: 100%; padding: 12px; background: var(--brand); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: background 0.15s; }
    .save-btn:hover { background: var(--brand-light); }
    .save-confirm { text-align: center; font-size: 12px; min-height: 18px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Rewardly Settings</h1>
        <p>Canadian credit card optimizer</p>
      </div>
    </div>

    <div class="card">
      <p class="card-title">Your Wallet</p>
      <div class="wallet-summary">
        <div class="wallet-count" id="walletCount">0 cards</div>
        <button class="edit-wallet-btn" id="editWalletBtn">Edit cards →</button>
      </div>
      <div id="walletPreview" style="margin-top:8px;font-size:12px;color:var(--text-muted);line-height:1.6"></div>
    </div>

    <div class="card">
      <p class="card-title">Notifications</p>
      <div class="setting-row">
        <div>
          <div class="setting-label">Auto-notify on merchant pages</div>
          <div class="setting-desc">Show which card to use when you visit a supported site</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="showNotifications" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Minimum rate to notify</div>
          <div class="setting-desc">Only notify when best effective rate exceeds this</div>
        </div>
        <select id="minRate">
          <option value="0">Always</option>
          <option value="1">1%+</option>
          <option value="2">2%+</option>
          <option value="3">3%+</option>
          <option value="5">5%+</option>
        </select>
      </div>
    </div>

    <button class="save-btn" id="saveBtn">Save Settings</button>
    <p class="save-confirm" id="saveConfirm"></p>
  </div>
  <script src="settings.js"></script>
</body>
</html>
