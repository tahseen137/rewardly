<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewardly</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div class="header">
      <div class="header-brand">
        <img src="icons/icon32.png" alt="" class="header-logo">
        <span class="header-name">Rewardly</span>
      </div>
      <button id="settingsBtn" class="icon-btn" title="Manage wallet">⚙️</button>
    </div>

    <!-- State: No wallet set up -->
    <div id="stateSetup" class="state hidden">
      <div class="empty-icon">💳</div>
      <h2 class="empty-title">Set up your wallet</h2>
      <p class="empty-desc">Add your Canadian credit cards once and Rewardly will tell you which one to pull out at every checkout.</p>
      <button id="setupBtn" class="btn-primary">Add My Cards</button>
    </div>

    <!-- State: Merchant detected -->
    <div id="stateMerchant" class="state hidden">
      <div class="merchant-header">
        <span id="merchantIcon" class="merchant-icon">🛍️</span>
        <div>
          <div id="merchantName" class="merchant-name">Merchant</div>
          <div id="merchantCategory" class="merchant-cat">Category</div>
        </div>
      </div>

      <div class="best-card-section">
        <div class="section-label">BEST CARD FOR THIS PURCHASE</div>
        <div class="best-card-row">
          <div>
            <div class="best-card-issuer" id="bestCardIssuer"></div>
            <div class="best-card-name" id="bestCardName"></div>
          </div>
          <div class="best-card-rate" id="bestCardRate"></div>
        </div>
      </div>

      <div id="loyaltySection" class="loyalty-section hidden">
        <div class="loyalty-tip" id="loyaltyTip"></div>
      </div>

      <div id="otherCardsSection" class="other-section hidden">
        <div class="section-label">YOUR OTHER CARDS</div>
        <div id="otherCardsList" class="other-cards-list"></div>
      </div>

      <div id="upgradeSection" class="upgrade-section hidden">
        <div class="upgrade-tip" id="upgradeTip"></div>
      </div>
    </div>

    <!-- State: No merchant / home -->
    <div id="stateNoMerchant" class="state hidden">
      <div class="section-label" style="margin-bottom:10px">YOUR WALLET</div>
      <div id="walletList" class="wallet-list"></div>
      <p class="hint-text">Visit a supported Canadian merchant and Rewardly will show you which card to use.</p>
    </div>

    <!-- State: Loading -->
    <div id="stateLoading" class="state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
